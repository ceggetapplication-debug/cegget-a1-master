<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier - Preview</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap');

        :root {
            --primary-bg: #FFFFFF;
            --secondary-bg: #F8F9FA;
            --pure-black: #000000;
            --soft-gray: #000000;
            /* User requested removing gray */
            --active-color: #15616d;
            /* Teal for specific elements */
            --btn-color: #ff7d00;
            /* Orange buttons */
            --separator-color: #78290f;
            --price-color: #000000;
        }

        body {
            font-family: 'Urbanist', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background: #FFF;
            min-height: 100vh;
            position: relative;
            padding-bottom: 120px;
        }

        .header {
            padding: 30px 25px 10px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--pure-black);
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        /* NAVIGATION BAR */
        .nav-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 10px 0 15px;
        }

        .nav-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            gap: 5px;
        }

        .nav-item {
            font-size: 16px;
            font-weight: 800;
            color: var(--pure-black);
            padding: 5px 10px;
            position: relative;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--active-color);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--active-color);
            border-radius: 1px;
        }

        .nav-separator {
            width: 2px;
            height: 18px;
            background-color: var(--separator-color);
            border-radius: 1px;
            margin: 0 5px;
            flex-shrink: 0;
        }

        .content {
            padding: 20px 20px;
        }

        /* PAPER LIST STYLE */
        .product-list-container {
            background: #FFFFFF;
            border-radius: 15px;
            padding: 5px 0;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .item-card {
            background: transparent;
            border-bottom: 1px solid #F0F0F0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
            margin: 0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-card:last-child {
            border-bottom: none;
        }

        .item-card:active {
            background: #FAFAFA;
        }

        .item-excluded {
            opacity: 0.4;
        }

        .item-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 2-LINE LAYOUT */
        .item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        .item-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--pure-black);
            line-height: 1.3;
        }

        .item-brand {
            font-size: 13px;
            color: #444;
            /* Slightly lighter than black (which is #000) for contrast, but close to black */
            font-weight: 600;
            /* Removed uppercase per request */
            letter-spacing: 0.5px;
        }

        .item-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--price-color);
            margin-right: 15px;
        }

        .check-circle {
            width: 22px;
            height: 22px;
            border-radius: 11px;
            border: 2px solid #DDD;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .check-circle-active {
            background: var(--active-color);
            border-color: var(--active-color);
            color: white;
        }

        .section-header {
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 14px;
            /* User requested 14 */
            font-weight: 800;
            color: var(--pure-black);
            /* Removed uppercase */
        }

        .pills-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: #F0F0F0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .pill.active {
            background: var(--pure-black);
            color: white;
        }

        .pill-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--soft-gray);
        }

        .pill.active .pill-text {
            color: white;
        }

        /* Specific Option Rows for CC & Free Delivery */
        .option-rows-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #EEE;
        }

        .option-text {
            font-size: 14px;
            /* Requested 14 */
            color: var(--pure-black);
            font-weight: 600;
        }

        .control-btn {
            background: var(--btn-color);
            /* Orange #ff7d00 */
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .control-btn:active {
            opacity: 0.8;
        }

        .control-btn.used {
            background: #CCC;
            cursor: default;
        }

        /* Summary Box - SMALLER BUTTON */
        .summary-box {
            background: transparent;
            /* Cleaner look at bottom */
            padding: 20px;
            margin-bottom: 20px;
            /* Removed shadow/border for 'sheet' look flow */
            border-top: 1px solid #EEE;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .total-label {
            font-size: 14px;
            /* User requested 14 */
            font-weight: 800;
            color: var(--pure-black);
            /* Removed uppercase */
        }

        .total-value {
            font-size: 16px;
            /* User requested 16 */
            font-weight: 900;
            color: var(--active-color);
            /* Teal #15616d */
        }

        .checkout-btn {
            background: var(--pure-black);
            color: white;
            padding: 10px 25px;
            /* Smaller padding */
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            /* Smaller button */
            cursor: pointer;
            margin-left: auto;
            /* Align right or center? User said "petit". Leaving auto width based on content */
            width: fit-content;
            border: none;
        }

        .checkout-btn-txt {
            font-weight: 800;
            font-size: 16px;
            /* Requested 16 */
        }

        .checkout-btn.disabled {
            background: #E0E0E0;
            cursor: not-allowed;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-body {
            background: var(--pure-black);
            border-radius: 40px;
            padding: 40px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            color: white;
        }

        .modal-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .qty-btn {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        .qty-val {
            font-size: 48px;
            font-weight: 900;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
        }

        .btn-confirm {
            flex: 1;
            background: white;
            color: black;
            padding: 18px;
            border-radius: 20px;
            font-weight: 800;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="mobile-container">
        <div class="header">
            <div class="header-title">Panier</div>
        </div>

        <div class="nav-container">
            <div class="nav-wrapper">
                <div class="nav-item active">Produits sélectionnés</div>
                <div class="nav-separator"></div>
                <div class="nav-item">État de la livraison</div>
                <div class="nav-separator"></div>
                <div class="nav-item">Liste des courses</div>
            </div>
        </div>

        <div class="content">
            <!-- PAPER LIST CONTAINER -->
            <div class="product-list-container" id="productList">
                <!-- Items rendered via JS -->
            </div>

            <div class="section-header">Type de livraison</div>
            <div class="pills-row">
                <div class="pill active" onclick="selectDelivery(this, 'rapid')">
                    <ion-icon name="flash"></ion-icon>
                    <span class="pill-text" id="btnRapid">Rapide (300 DZD)</span>
                </div>
                <div class="pill" onclick="selectDelivery(this, 'normal')">
                    <ion-icon name="bicycle"></ion-icon>
                    <span class="pill-text" id="btnNormal">Standard (150 DZD)</span>
                </div>
                <div class="pill" onclick="selectDelivery(this, 'pickup')">
                    <ion-icon name="walk"></ion-icon>
                    <span class="pill-text">Retrait (Gratuit)</span>
                </div>
            </div>

            <!-- OPTIONS CC & FREE DELIVERY -->
            <div class="option-rows-container" id="optionsContainer">
                <!-- CC Row (Rapid & Normal only) -->
                <div class="option-row" id="ccRow">
                    <div class="option-text">Solde CC: 5000 DZD</div>
                    <button class="control-btn" id="btnCC" onclick="toggleCC()">Utiliser</button>
                </div>

                <!-- Free Delivery Row (Normal only) -->
                <div class="option-row" id="freeDeliveryRow" style="display:none;">
                    <div class="option-text">Livraisons gratuites: 3</div>
                    <button class="control-btn" id="btnFree" onclick="toggleFreeDelivery()">Utiliser</button>
                </div>
            </div>

            <div id="paymentSection" style="margin-top: 25px;">
                <div class="section-header">Moyen de paiement</div>
                <div class="pills-row">
                    <div class="pill active" onclick="selectPayment(this, 'cash')">
                        <ion-icon name="cash"></ion-icon>
                        <span class="pill-text">Espèces à la livraison</span>
                    </div>
                </div>
            </div>

            <div class="summary-box">
                <div class="total-row">
                    <span class="total-label">Total à payer</span>
                    <span class="total-value" id="totalDisplay">0.00 DZD</span>
                </div>
                <div style="display: flex; justify-content: flex-end;">
                    <button class="checkout-btn" onclick="placeOrder()">
                        <span class="checkout-btn-txt">Commander</span>
                        <ion-icon name="chevron-forward"></ion-icon>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Quantity Modal -->
    <div class="modal-overlay" id="qtyModal">
        <div class="modal-body">
            <div class="modal-title">Quantité</div>
            <div class="qty-control">
                <div class="qty-btn" onclick="updateModalQty(-1)">-</div>
                <div class="qty-val" id="modalQtyVal">1</div>
                <div class="qty-btn" onclick="updateModalQty(1)">+</div>
            </div>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmQty()">Confirmer</button>
            </div>
        </div>
    </div>

    <script>
        // Mock Data
        const products = [
            { id: 1, nom: 'Lait Nutritif', marque: 'Candia', prix: 120, valeurQuantite: 1 },
            { id: 2, nom: 'Eau Minérale', marque: 'Ifri', prix: 40, valeurQuantite: 6 },
            { id: 3, nom: 'Fromage Fondu', marque: 'La Vache Qui Rit', prix: 350, valeurQuantite: 1 }
        ];

        let selectedIds = [1, 2, 3];
        let currentModalId = null;
        let deliveryPrice = 300; // Default Rapid
        let useCC = false;
        let useFree = false;
        let currentDeliveryType = 'rapid';

        function renderProducts() {
            const container = document.getElementById('productList');
            container.innerHTML = '';

            products.forEach(p => {
                const isChecked = selectedIds.includes(p.id);
                const item = document.createElement('div');
                item.className = 'item-card ' + (isChecked ? '' : 'item-excluded');
                const totalPrice = (p.valeurQuantite * p.prix).toFixed(2);

                item.innerHTML = `
                <div class="item-content" onclick="openQtyModal(${p.id})">
                    <div class="item-info">
                        <div class="item-title">${p.nom}</div>
                        <div class="item-brand">${p.marque}</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                         <div class="item-price">${totalPrice} DZD</div>
                         <div class="check-circle ${isChecked ? 'check-circle-active' : ''}" onclick="toggleCheck(event, ${p.id})">
                             ${isChecked ? '<ion-icon name="checkmark"></ion-icon>' : ''}
                        </div>
                    </div>
                </div>
            `;
                container.appendChild(item);
            });
            updateTotal();
        }

        function toggleCheck(e, id) {
            e.stopPropagation();
            if (selectedIds.includes(id)) {
                selectedIds = selectedIds.filter(i => i !== id);
            } else {
                selectedIds.push(id);
            }
            renderProducts();
        }

        function updateTotal() {
            let itemsTotal = 0;
            products.forEach(p => {
                if (selectedIds.includes(p.id)) {
                    itemsTotal += p.valeurQuantite * p.prix;
                }
            });

            // If Free Delivery, price is 0
            let finalPrice = (useFree) ? 0 : deliveryPrice;
            if (currentDeliveryType === 'pickup') finalPrice = 0;

            let grandTotal = itemsTotal + finalPrice;

            if (useCC) {
                // Deduct mock CC
                grandTotal = Math.max(0, grandTotal - 500);
            }

            document.getElementById('totalDisplay').textContent = grandTotal.toFixed(2) + ' DZD';
        }

        function selectDelivery(el, type) {
            document.querySelectorAll('.pills-row .pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            currentDeliveryType = type;

            // Show/Hide Logic
            const ccRow = document.getElementById('ccRow');
            const freeRow = document.getElementById('freeDeliveryRow');

            ccRow.style.display = 'none';
            freeRow.style.display = 'none';

            if (type === 'rapid') {
                deliveryPrice = 300;
                ccRow.style.display = 'flex'; // Rapid: CC only
            }
            if (type === 'normal') {
                deliveryPrice = 150;
                ccRow.style.display = 'flex'; // Normal: CC + Free
                freeRow.style.display = 'flex';
            }
            if (type === 'pickup') {
                deliveryPrice = 0;
                // Pickup: Nothing
            }

            updateTotal();
        }

        function toggleCC() {
            useCC = !useCC;
            const btn = document.getElementById('btnCC');
            if (useCC) {
                btn.textContent = 'Non';
                btn.style.background = '#000';
            } else {
                btn.textContent = 'Utiliser';
                btn.style.background = '#ff7d00';
            }
            updateTotal();
        }

        function toggleFreeDelivery() {
            useFree = !useFree;
            const btn = document.getElementById('btnFree');
            if (useFree) {
                btn.textContent = 'Non';
                btn.style.background = '#000';
            } else {
                btn.textContent = 'Utiliser';
                btn.style.background = '#ff7d00';
            }
            updateTotal();
        }

        function selectPayment(el, type) {
            el.parentElement.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
        }

        function placeOrder() {
            alert('Commande validée !');
        }

        // Modal
        function openQtyModal(id) {
            currentModalId = id;
            const p = products.find(prod => prod.id === id);
            document.getElementById('modalQtyVal').textContent = p.valeurQuantite;
            document.getElementById('qtyModal').style.display = 'flex';
        }

        function updateModalQty(delta) {
            const valEl = document.getElementById('modalQtyVal');
            let val = parseInt(valEl.textContent);
            if (val + delta > 0) valEl.textContent = val + delta;
        }

        function confirmQty() {
            const val = parseInt(document.getElementById('modalQtyVal').textContent);
            const p = products.find(prod => prod.id === currentModalId);
            if (p) {
                p.valeurQuantite = val;
                renderProducts();
            }
            document.getElementById('qtyModal').style.display = 'none';
        }

        // Init with logic
        renderProducts();
        selectDelivery(document.querySelector('.pill.active'), 'rapid');
    </script>

</body>

</html>
