<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Expérience Commande - Multilingue (t())</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            overflow: hidden;
            padding: 20px;
        }


        .phone-container {
            width: 375px;
            height: 667px;
            background-size: cover;
            background-position: center;
            background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?ixlib=rb-4.0.3&auto=format&fit=crop&w=375&q=80');
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border-radius: 45px;
            overflow: hidden;
            border: 8px solid #333;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: all 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 0;
            z-index: 10;
            transform: translateY(5px);
        }

        .icon-btn {
            width: 54px;
            height: 54px;
            border-radius: 27px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #001524;
            font-size: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .icon-btn.active {
            color: #ff7d00;
        }

        .modal-content {
            background: #fff;
            border-radius: 45px 45px 0 0;
            padding: 35px 30px 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            max-height: 90%;
            /* Removed fixed height to allow auto-wrapping per user request */
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .scroll-view {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .scroll-view::-webkit-scrollbar {
            width: 4px;
        }

        .scroll-view::-webkit-scrollbar-thumb {
            background: #eee;
            border-radius: 10px;
        }

        /* PALETTE EXACTE */
        .m-title {
            font-size: 18px;
            font-weight: 900;
            color: #15616d;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-row {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
        }

        .label {
            font-size: 15px;
            font-weight: 800;
            color: #001524;
            margin-right: 8px;
        }

        .value {
            font-size: 15px;
            font-weight: 500;
            color: #000000;
        }

        .price-value {
            font-size: 18px;
            font-weight: 900;
            color: #ff7d00;
        }

        .store-value {
            font-size: 15px;
            font-weight: 800;
            color: #000000;
        }

        .description {
            font-size: 15px;
            color: #000000;
            line-height: 1.5;
            margin-top: 5px;
        }

        .cmd-btn {
            background: #ff7d00;
            width: 100%;
            height: 50px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(255, 125, 0, 0.3);
        }

        #modal-quantity {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .q-card {
            background: #fff;
            border-radius: 45px;
            padding: 25px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .back-btn-container {
            width: 100%;
            display: flex;
            margin-bottom: 15px;
        }

        .back-arrow {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #001524;
            cursor: pointer;
        }

        .q-title {
            font-size: 18px;
            font-weight: 900;
            color: #15616d;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .q-question {
            font-size: 15px;
            color: #001524;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.4;
        }

        .selector {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn-side {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: #001524;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            border: none;
        }

        .input-wrapper {
            margin: 0 15px;
            width: 100px;
            height: 50px;
            background: #f8f8f8;
            border-radius: 15px;
            border: 1.5px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .q-input {
            width: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            color: #000000;
            outline: none;
        }

        .formatted-q {
            font-size: 15px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 25px;
        }

        .price-box {
            display: flex;
            align-items: baseline;
            margin-bottom: 30px;
        }

        .price-label {
            font-size: 15px;
            font-weight: 700;
            color: #001524;
            margin-right: 8px;
        }

        .price-val {
            font-size: 18px;
            font-weight: 900;
            color: #ff7d00;
        }

        #bg-blur {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(5px);
            display: none;
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <!-- MODAL 1 -->
        <div class="overlay" id="overlay-1">
            <div class="top-bar">
                <button class="icon-btn"><ion-icon name="chevron-down"></ion-icon></button>
                <button class="icon-btn" id="fav-btn" onclick="toggleFav()"><ion-icon
                        name="heart-outline"></ion-icon></button>
            </div>
            <div class="modal-content">
                <div class="scroll-view">
                    <h2 class="m-title" data-t="surLeProd"></h2>
                    <div class="info-row"><span class="label" data-t="product_name"></span><span class="value"
                            id="p-name">Café Moulu El Mordjene</span></div>
                    <div class="info-row"><span class="label" data-t="product_brand"></span><span class="value"
                            id="p-brand">El Mordjene</span></div>

                    <div class="info-row"><span class="label" id="unit-label"></span><span class="value"
                            id="unit-val">250g</span></div>

                    <div class="info-row"><span class="label" data-t="commandsMgz.unitPriceLabel"></span><span
                            class="price-value"><span id="p-price">450.00</span> <span
                                data-t="commandList.currency"></span></span>
                    </div>
                    <div class="info-row"><span class="label" data-t="productDetails"></span>
                        <p class="description" id="p-desc">Un café d'exception à l'arôme intense, sélectionné parmi les
                            meilleurs
                            grains d'arabica.</p>
                    </div>
                    <div class="info-row"><span class="label" data-t="ordersByStore.store"></span><span
                            class="store-value" id="p-store">Carrefour Alger</span></div>
                    <div class="info-row"><span class="label" data-t="commandList.address"></span><span class="value"
                            id="p-addr">123 Rue Didouche Mourad, Alger</span></div>
                </div>
                <button class="cmd-btn" onclick="openQuantityModal()" data-t="place_order_label"></button>
            </div>
        </div>

        <div id="bg-blur"></div>

        <!-- MODAL 2 -->
        <div id="modal-quantity">
            <div class="q-card">
                <div class="back-btn-container">
                    <div class="back-arrow" onclick="closeQuantityModal()"><ion-icon
                            name="arrow-back-outline"></ion-icon></div>
                </div>
                <h2 class="q-title" data-t="add_to_cart_title"></h2>
                <p class="q-question" data-t="add_to_cart_message"></p>

                <div class="selector">
                    <button class="btn-side" onclick="changeVal(-1)"><ion-icon name="remove"></ion-icon></button>
                    <div class="input-wrapper">
                        <input type="number" class="q-input" id="q-input" value="1" oninput="updateUI()">
                    </div>
                    <button class="btn-side" onclick="changeVal(1)"><ion-icon name="add"></ion-icon></button>
                </div>

                <p class="formatted-q" id="formatted-q"></p>

                <div class="price-box">
                    <span class="price-label" data-t="commandsMgz.unitPriceLabel"></span>
                    <span class="price-val"><span id="price-total"></span> <span
                            data-t="commandList.currency"></span></span>
                </div>

                <button class="cmd-btn" onclick="handleConfirmOrder()" data-t="place_order_label"></button>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            fr: {
                "surLeProd": "À propos du produit",
                "product_name": "Nom:",
                "product_brand": "Marque:",
                "productDetails": "Détails:",
                "ordersByStore.store": "Magasin:",
                "commandList.address": "Adresse du magasin:",
                "commandList.currency": "DZD",
                "place_order_label": "Commander",
                "add_to_cart_title": "ajout au panier",
                "add_to_cart_message": "Combien voulez vous ajouter ce produit au panier?",
                "commandsMgz.unitPriceLabel": "Prix:",
                "unit_label": "Unité",
                "weight": "Poids",
                "volumeu": "Volume",
                "tab.favorite": "Favoris",
                "modals.product.favorite_added_message": "Le produit a été ajouté à vos favoris.",
                "general.error": "Erreur",
                "general.success": "Succès",
                "montantCCinvalide": "Veuillez saisir une quantité valide.",
                "product_added_successfully": "produit ajouté avec succès"
            },
            kab: {
                "surLeProd": "Ghessen n sselƐa",
                "product_name": "Isem:",
                "product_brand": "Lmarka:",
                "productDetails": "Talqayt:",
                "ordersByStore.store": "Taḥanut:",
                "commandList.address": "Tansiwt n tḥanut:",
                "commandList.currency": "DA",
                "place_order_label": "Azen lamer",
                "add_to_cart_title": "Rnu g ssekwa",
                "add_to_cart_message": "Achḥal i tebgid ad trnud?",
                "commandsMgz.unitPriceLabel": "Ssuma:",
                "unit_label": "Tafertant",
                "weight": "Azqal",
                "volumeu": "Ableɣ",
                "tab.favorite": "Imeztayen",
                "modals.product.favorite_added_message": "SselƐa-agi ternu ɣer imeztayen-ik.",
                "general.error": "Agul",
                "general.success": "Yelha",
                "montantCCinvalide": "Azen achḥal i yelhan.",
                "product_added_successfully": "SselƐa ternu s lfarḥ"
            }
        };

        let currentLang = 'fr';
        let unitWeight = 250;
        let pricePerUnit = 450;

        function t(key, replacements = {}) {
            let text = translations[currentLang][key] || key;
            for (let k in replacements) {
                text = text.replace(`{{${k}}}`, replacements[k]);
            }
            return text;
        }


        function updateTranslations() {
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                el.innerText = t(key);
            });

            // Re-update unit label
            const unitVal = document.getElementById('unit-val').innerText;
            document.getElementById('unit-label').innerText = getTranslatedUnitLabel(unitVal);
        }

        function getTranslatedUnitLabel(val) {
            if (!val) return t('unit_label') + ":";
            const v = val.toLowerCase();
            if (v.includes('ml') || v.includes('cl') || v.includes('l')) return t('volumeu') + ":";
            if (v.includes('g') || v.includes('kg')) return t('weight') + ":";
            return t('unit_label') + ":";
        }

        function updateUI() {
            const input = document.getElementById('q-input');
            let val = parseInt(input.value) || 0;
            let totalPrice = val * pricePerUnit;
            let totalGrams = val * unitWeight;
            let weightStr = (totalGrams < 1000) ? (totalGrams + "g") : ((totalGrams / 1000).toFixed(1) + "kg");

            document.getElementById('formatted-q').innerText = val + " x " + unitWeight + "g (" + weightStr + ")";
            document.getElementById('price-total').innerText = totalPrice.toFixed(2);
        }

        function changeVal(dir) {
            const input = document.getElementById('q-input');
            let val = parseInt(input.value) || 0;
            val += dir;
            if (val < 1) val = 1;
            input.value = val;
            updateUI();
        }

        function handleConfirmOrder() {
            const input = document.getElementById('q-input');
            const val = parseInt(input.value) || 0;
            if (val <= 0) {
                alert(t('general.error') + ": " + t('montantCCinvalide'));
                return;
            }
            alert(t('general.success') + ": " + t('product_added_successfully'));
            closeQuantityModal();
        }

        function openQuantityModal() {
            document.getElementById('modal-quantity').style.display = 'flex';
            document.getElementById('bg-blur').style.display = 'block';
        }
        function closeQuantityModal() {
            document.getElementById('modal-quantity').style.display = 'none';
            document.getElementById('bg-blur').style.display = 'none';
        }
        function toggleFav() {
            const btn = document.getElementById('fav-btn');
            const icon = btn.querySelector('ion-icon');
            if (btn.classList.contains('active')) {
                btn.classList.remove('active'); icon.setAttribute('name', 'heart-outline');
            } else {
                btn.classList.add('active'); icon.setAttribute('name', 'heart');
                alert(t('tab.favorite') + ": " + t('modals.product.favorite_added_message'));
            }
        }

        // Init
        updateTranslations();
        updateUI();
    </script>
</body>

</html>
