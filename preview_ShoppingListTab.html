<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - ShoppingListTab.tsx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e0e0e0; display: flex; justify-content: center; padding: 40px 20px; font-family: 'Inter', sans-serif; }
    .phone {
      width: 390px;
      min-height: 500px;
      background: #fafafa;
      border-radius: 48px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35), inset 0 0 0 2px #222;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .status-bar { background: #fafafa; padding: 12px 24px 4px; display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: #001524; flex-shrink: 0; }

    /* === Exact styles from ShoppingListTab.tsx === */
    .container { padding: 15px; overflow-y: auto; flex: 1; scrollbar-width: none; }
    .container::-webkit-scrollbar { display: none; }

    .delivery-label {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #001524;
    }

    .add-course-input-wrapper {
      display: flex;
      flex-direction: row;
      align-items: center;
      background: #fdfdfd;
      border: 2px solid #15616d;
      border-radius: 2px;
      padding: 8px;
      margin-bottom: 5px;
    }

    .courses-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      color: #000;
      font-family: 'Inter', sans-serif;
      background: transparent;
    }

    .add-btn {
      font-size: 26px;
      cursor: pointer;
      padding: 2px 6px;
      color: #888;
      transition: color 0.2s;
      border: none;
      background: transparent;
      font-family: inherit;
      line-height: 1;
    }

    .add-btn.active { color: #ff7d00; }

    .list-container {
      max-height: 100%;
      margin-top: 10px;
      padding: 2px;
      border: 2px solid #15616d;
      border-radius: 2px;
      background: #fdfdfd;
    }

    .courses-list-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 8px 5px;
      border-bottom: 1px solid #eee;
    }
    .courses-list-item:last-child { border-bottom: none; }

    .checkbox-icon {
      font-size: 22px;
      cursor: pointer;
      padding: 5px;
      color: #888;
      min-width: 32px;
      text-align: center;
    }
    .checkbox-icon.checked { color: #ff7d00; }

    .courses-item-text {
      flex: 1;
      margin: 0 12px;
      font-size: 15px;
      font-weight: 500;
      color: #000;
    }
    .courses-item-text.checked { text-decoration: line-through; color: #dbdbdb; }

    .trash-icon {
      font-size: 18px;
      cursor: pointer;
      color: #001524;
      padding: 5px;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>16:03</span><span>▌▌▌ ☁ 🔋</span></div>

  <div class="container">
    <div class="delivery-label">Liste de courses</div>

    <div class="add-course-input-wrapper">
      <input
        class="courses-input"
        id="course-input"
        placeholder="Ajouter un article..."
        oninput="updateBtn()"
        onkeydown="handleKey(event)"
      />
      <button class="add-btn" id="add-btn" onclick="addItem()">＋</button>
    </div>

    <div class="list-container" id="courses-list">
      <div class="courses-list-item" id="ci-1">
        <span class="checkbox-icon checked" onclick="toggleCourse('ci-1')">☑</span>
        <span class="courses-item-text checked">Pain</span>
        <span class="trash-icon" onclick="removeCourse('ci-1')">🗑</span>
      </div>
      <div class="courses-list-item" id="ci-2">
        <span class="checkbox-icon" onclick="toggleCourse('ci-2')">□</span>
        <span class="courses-item-text">Oeufs × 12</span>
        <span class="trash-icon" onclick="removeCourse('ci-2')">🗑</span>
      </div>
      <div class="courses-list-item" id="ci-3">
        <span class="checkbox-icon" onclick="toggleCourse('ci-3')">□</span>
        <span class="courses-item-text">Huile d'olive 1L</span>
        <span class="trash-icon" onclick="removeCourse('ci-3')">🗑</span>
      </div>
      <div class="courses-list-item" id="ci-4">
        <span class="checkbox-icon" onclick="toggleCourse('ci-4')">□</span>
        <span class="courses-item-text">Sucre 2kg</span>
        <span class="trash-icon" onclick="removeCourse('ci-4')">🗑</span>
      </div>
    </div>
  </div>
</div>

<script>
  let counter = 4;

  function updateBtn() {
    const val = document.getElementById('course-input').value.trim();
    const btn = document.getElementById('add-btn');
    if (val.length > 0) {
      btn.textContent = '✓';
      btn.classList.add('active');
    } else {
      btn.textContent = '＋';
      btn.classList.remove('active');
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter') addItem();
  }

  function addItem() {
    const input = document.getElementById('course-input');
    const text = input.value.trim();
    if (!text) return;
    counter++;
    const id = 'ci-' + counter;
    const list = document.getElementById('courses-list');
    const div = document.createElement('div');
    div.className = 'courses-list-item';
    div.id = id;
    div.innerHTML = `
      <span class="checkbox-icon" onclick="toggleCourse('${id}')">□</span>
      <span class="courses-item-text">${text}</span>
      <span class="trash-icon" onclick="removeCourse('${id}')">🗑</span>
    `;
    list.appendChild(div);
    input.value = '';
    updateBtn();
    input.focus();
  }

  function toggleCourse(id) {
    const item = document.getElementById(id);
    const icon = item.querySelector('.checkbox-icon');
    const text = item.querySelector('.courses-item-text');
    const isChecked = icon.classList.contains('checked');
    if (isChecked) {
      icon.className = 'checkbox-icon';
      icon.textContent = '□';
      text.classList.remove('checked');
    } else {
      icon.className = 'checkbox-icon checked';
      icon.textContent = '☑';
      text.classList.add('checked');
    }
  }

  function removeCourse(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
</body>
</html>
