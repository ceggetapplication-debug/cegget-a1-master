<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cégget - Accueil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ── PHONE SHELL ── */
        .phone {
            width: 390px;
            height: 844px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            position: relative;
            overflow: hidden;
            background: #fafafa;
        }

        /* ══════════════════════════════════════
       ALL SCREENS : absolute, fill phone
    ══════════════════════════════════════ */
        .screen {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
            /* hidden by default */
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* ══════════════════════════════════════
       SCREEN 1 : HOME (5 figures)
    ══════════════════════════════════════ */
        #s-home {
            background-color: #ff7d00;
            padding: 30px 10px;
            overflow: hidden;
        }

        /* Overlay demi-transparent */
        .bg-overlay {
            position: absolute;
            inset: 0;
            background-color: #ff7d00;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Gouttes */
        .drop {
            position: absolute;
            background-color: #15616d;
            opacity: 0.5;
            border-radius: 999px;
            pointer-events: none;
        }

        /* Bouton GPS */
        .gps-btn {
            position: absolute;
            top: 35px;
            right: 20px;
            z-index: 100;
            background-color: #ffecd1;
            border-radius: 50px;
            padding: 10px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Figures */
        .figures-root {
            position: relative;
            z-index: 2;
        }

        .fig-row {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .fig-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .fig-label {
            font-size: 18px;
            color: #001524;
            font-style: italic;
            font-weight: bold;
            margin-top: -8px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* ══════════════════════════════════════
       SCREEN 2 : GROUPE (types de magasin)
       SCREEN 3 : MAGASINS
       SCREEN 4 : CATEGORIES / PRODUITS
       SCREEN 5 : DETAIL MAGASIN
    ══════════════════════════════════════ */
        .hier-header {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0 10px;
            margin-top: 35px;
            margin-bottom: 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
        }

        .back-btn svg {
            width: 32px;
            height: 32px;
        }

        .hier-title {
            font-size: 18px;
            font-weight: bold;
            font-style: italic;
            color: #001524;
        }

        /* scroll area inside hierarchy screens */
        .hier-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ── Types Container ── */
        .types-grid {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            padding: 10px 16px 40px;
            gap: 0;
        }

        .type-btn {
            width: 160px;
            height: 70px;
            margin: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .type-btn svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .type-btn-label {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            width: 140px;
            position: relative;
            z-index: 1;
        }

        /* ── Magasin list ── */
        .magasin-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 40px;
            gap: 16px;
        }

        .magasin-card {
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            background-color: #e5e5e5;
            cursor: pointer;
        }

        .magasin-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }

        .magasin-name {
            font-size: 14px;
            font-weight: 700;
            color: #001524;
            padding: 10px;
            text-align: center;
        }

        /* ── Categorie chips ── */
        .cat-chips {
            margin-bottom: 20px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            padding: 0 12px;
            gap: 20px;
            align-items: center;
            flex-shrink: 0;
        }

        .chip {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .chip-img-box {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .chip-img {
            width: 52px;
            height: 52px;
            object-fit: cover;
        }

        .chip-border {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            border: 2px solid transparent;
        }

        .chip-border.on {
            border-color: #15616d;
        }

        .chip-label {
            font-size: 13px;
            font-weight: 600;
            color: #c8c8c8;
            text-align: center;
            max-width: 80px;
            white-space: normal;
        }

        .chip-label.on {
            color: #15616d;
            font-weight: 800;
        }

        /* ── Produits ── */
        .produits-wrap {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 16px 40px;
        }

        .type-accordion {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 2px 4px;
            margin-top: 10px;
            cursor: pointer;
            background: transparent;
            border: none;
            width: 100%;
        }

        .type-acc-label {
            font-size: 15px;
            font-weight: 700;
            color: #15616d;
            border-bottom: 1.5px solid #ff7d00;
        }

        .prod-card {
            display: flex;
            align-items: center;
            margin-top: 15px;
            border-radius: 12px;
            padding: 10px 5px;
            overflow: hidden;
            background-color: #ececec;
            cursor: pointer;
        }

        .prod-card.rev {
            flex-direction: row-reverse;
        }

        .prod-img-box {
            width: 45%;
            position: relative;
        }

        .prod-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }

        /* badge promo */
        .discount-badge {
            position: absolute;
            top: -10px;
            left: -5px;
            width: 47px;
            height: 47px;
        }

        .discount-badge.right {
            left: auto;
            right: -5px;
        }

        .prod-info {
            flex: 1;
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .prod-nom {
            font-size: 14px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
            margin-left: 5px;
        }

        .prod-marq {
            font-size: 14px;
            color: #001524;
            margin-bottom: 6px;
            font-style: italic;
            margin-left: 25px;
        }

        .prod-prix {
            font-size: 13px;
            font-weight: 600;
            color: #000;
            margin-left: 25px;
        }

        .prod-old {
            font-size: 13px;
            color: #7d7d7d;
            text-decoration: line-through;
        }

        .prix-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            margin-left: 5px;
        }

        /* empty text */
        .empty-txt {
            color: #001524;
            font-size: 15px;
            opacity: 0.6;
            text-align: center;
            margin-top: 40px;
        }

        /* ── Detail magasin ── */
        .detail-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 16px 40px;
        }

        .detail-nom {
            font-size: 18px;
            font-weight: bold;
            font-style: italic;
            color: #15616d;
            margin-bottom: 12px;
        }

        .detail-cover {
            width: 100%;
            height: 150px;
            border-radius: 16px;
            margin-bottom: 12px;
            object-fit: cover;
        }

        .detail-lbl {
            font-size: 15px;
            font-weight: bold;
            font-style: italic;
            color: #001524;
            margin-bottom: 4px;
            margin-top: 10px;
        }

        .detail-txt {
            font-size: 14px;
            color: #000;
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .detail-gris {
            font-size: 14px;
            color: #595959;
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .detail-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0;
            flex-wrap: wrap;
            padding: 0 4px;
        }

        /* ── Modals (Product Info, Order, Map) ── */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 500;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            border-radius: 45px 45px 0 0;
            padding: 35px 30px 40px;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modal-close-circle {
            position: absolute;
            top: -65px;
            right: 20px;
            background: #fff;
            width: 54px;
            height: 54px;
            border-radius: 27px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        .modal-fav-circle {
            position: absolute;
            top: -65px;
            left: 20px;
            background: #fff;
            width: 54px;
            height: 54px;
            border-radius: 27px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        /* ── Map Modal Styles ── */
        #modal-map {
            align-items: stretch;
            background: #fff;
            overflow-y: auto;
        }

        .map-mockup {
            height: 300px;
            background: #e0e0e0;
            position: relative;
            background-image: url('https://user-images.githubusercontent.com/10972410/37456728-66236b3e-282e-11e8-96f3-176f920f7f32.png');
            background-size: cover;
            flex-shrink: 0;
        }

        .map-content-scroll {
            flex: 1;
            padding: 20px;
            background: #fafafa;
        }

        .info-section {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .info-lbl {
            font-size: 14px;
            font-weight: bold;
            color: #15616d;
        }

        .info-val {
            font-size: 15px;
            color: #333;
        }

        .photo-box {
            width: 100%;
            height: 120px;
            background: #eee;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            border: 1px dashed #ccc;
        }
    </style>
</head>

    </div>
    <div class="prod-info">
      <span class="prod-nom">${p.nom}</span>
      ${p.marque ? `<span class="prod-marq">${p.marque}</span>` : ''}
      ${isPromo && p.oldPrice
                    ? `<div class="prix-row"><span class="prod-old">${p.oldPrice} DZD</span><span class="prod-prix" style="margin-left:0">${p.prix} DZD</span></div>`

            card.onclick = function () { openProduct(p); };
            return card;
        }

        /* Basculer favori dans le preview */
        function toggleFavoriPreview(magasinNom) {
            const idx = userFavoris.indexOf(magasinNom);
            if (idx > -1) {
                userFavoris.splice(idx, 1);
            } else {
                userFavoris.push(magasinNom);
            }
            // On rafraîchit la vue
            goDetail(currentTypeName);
        }

        /* GROUPE 5 → DETAIL MAGASIN */
        function goDetail(typeName) {
            document.getElementById('detail-type-title').textContent = typeName;

            const m = demoMagasinD;
            const jours = [
                ['Lundi', m.horaires.lundi],
                ['Mardi', m.horaires.mardi],
                ['Mercredi', m.horaires.mercredi],
                ['Jeudi', m.horaires.jeudi],
                ['Vendredi', m.horaires.vendredi],
                ['Samedi', m.horaires.samedi],
            ];

            let photosHtml = '';
            if (m.photosPartagees && m.photosPartagees.length > 0) {
                const imgs = m.photosPartagees.map(uri =>
                    `<img src="${uri}" style="width:200px;height:200px;border-radius:12px;margin-right:10px;object-fit:cover;flex-shrink:0;">`
                ).join('');
                photosHtml = `
      <span class="detail-lbl">Photos partagées</span>
      <div style="display:flex;overflow-x:auto;padding:10px 0;gap:10px;">${imgs}</div>
    `;
            }

            const horaireRows = jours.filter(([_, h]) => h).map(([jour, h]) => `
    <div class="detail-row">
      <span class="detail-txt">${jour}</span>
      <span class="detail-gris">${h.o} - ${h.f}</span>
    </div>
  `).join('');

            document.getElementById('detail-content').innerHTML = `
    <span class="detail-nom">${m.nom}</span>
    <img class="detail-cover" src="${m.photo}" alt="${m.nom}">

    <div class="detail-row">
      <span class="detail-lbl">${userFavoris.includes(m.nom) ? 'Retirer des favoris' : 'Ajouter aux favoris'}</span>
      <span style="font-size:28px;cursor:pointer;color:${userFavoris.includes(m.nom) ? 'red' : '#ccc'};" onclick="toggleFavoriPreview('${m.nom}')">
        ${userFavoris.includes(m.nom) ? '♥' : '♡'}
      </span>
    </div>

    <div style="display:flex;align-items:center;flex-wrap:wrap;">
      <span class="detail-lbl">Ce magasin est aimé par&nbsp;</span>
      <span class="detail-gris">${m.likes}&nbsp;</span>
      <span class="detail-lbl">personnes</span>
    </div>

    <span class="detail-lbl">Adresse:</span>
    <span class="detail-txt">${m.adresse}</span>

    ${photosHtml}

    <div class="detail-row">
      <span class="detail-lbl">Aller au magasin</span>
      <span style="font-size:22px;cursor:pointer;" onclick="goCategories('${m.nom}')">🔗</span>
    </div>

    <span class="detail-lbl">Horaires d'ouverture</span>
    ${horaireRows}

    <span class="detail-lbl">Contact du magasin</span>
    <div class="detail-row">
      <span class="detail-txt">Email:</span>
      <span class="detail-gris">${m.email ?? 'Non disponible'}</span>
    </div>
    <div class="detail-row">
      <span class="detail-txt">Téléphone:</span>
      <span class="detail-gris">${m.telephone ?? 'Non disponible'}</span>
    </div>
  `;

            showScreen('s-detail');
        }

        /* ── MODALS ── */
        function openMap() { document.getElementById('modal-map').style.display = 'flex'; }
        function closeMap() { document.getElementById('modal-map').style.display = 'none'; }

        function openProduct(p) {
            const body = document.getElementById('product-detail-body');
            body.innerHTML = `
                <h2 style="font-size:18px; font-weight:900; color:#15616d; margin-bottom:15px; text-transform:uppercase;">SUR LE PRODUIT</h2>
                <img src="${p.img}" style="width:100%; height:200px; border-radius:20px; margin-bottom:20px; object-fit:cover;">
                <div style="display:flex; margin-bottom:10px;"><span style="font-weight:800; margin-right:8px;">Nom:</span><span>${p.nom}</span></div>
                <div style="display:flex; margin-bottom:10px;"><span style="font-weight:800; margin-right:8px;">Marque:</span><span>${p.marque || 'N/A'}</span></div>
                <div style="display:flex; margin-bottom:10px;"><span style="font-weight:800; margin-right:8px;">Prix:</span><span style="color:#ff7d00; font-weight:900; font-size:18px;">${p.prix} DZD</span></div>
                <div style="margin-top:20px;">
                    <span style="font-weight:800;">Détails:</span>
                    <p style="margin-top:5px; font-size:14px; line-height:1.5;">${p.description || 'Pas de description disponible pour ce produit.'}</p>
                </div>
            `;
            document.getElementById('modal-product').classList.add('open');
        }
        function closeProductModal() { document.getElementById('modal-product').classList.remove('open'); }
    </script>
</body>

</html>
