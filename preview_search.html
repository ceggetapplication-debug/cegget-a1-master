<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="search-logic.js"></script>
    <style>
        :root {
            --primary: #15616d;
            --secondary: #ff7d00;
            --dark: #001524;
            --light: #ffecd1;
            --accent: #78290f;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: transparent;
            color: var(--dark);
        }

        .container {
            padding: 20px;
            padding-top: 50px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Search Bar */
        .search-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid var(--primary);
            border-radius: 8px;
            background-color: var(--white);
            padding: 0 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            color: var(--dark);
            border: none;
            outline: none;
            background: transparent;
        }

        .search-button {
            padding: 8px;
            border-radius: 50%;
            background-color: var(--light);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button ion-icon {
            font-size: 24px;
            color: var(--secondary);
        }

        /* Suggestions Dropdown */
        .suggestions-dropdown {
            background-color: var(--white);
            border: 1px solid var(--primary);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            display: none;
        }

        .suggestion-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f8f8f8;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .suggestion-item:hover {
            background-color: var(--light);
        }

        .suggestion-text {
            font-size: 16px;
            color: #333;
            flex: 1;
        }

        /* Sections */
        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 5px;
        }

        /* Recent Searches */
        .item-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--light);
            background-color: var(--white);
        }

        .item-icon {
            font-size: 18px;
            color: var(--accent);
            margin-right: 10px;
        }

        .item-text {
            flex: 1;
            font-size: 16px;
            color: var(--primary);
            cursor: pointer;
        }

        .remove-button {
            padding: 5px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .remove-button ion-icon {
            font-size: 20px;
            color: var(--accent);
        }

        /* Popular Products */
        .popular-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--light);
            background-color: var(--white);
            cursor: pointer;
        }

        .popular-item:hover {
            background-color: var(--light);
        }

        .popular-text {
            font-size: 16px;
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Que cherchez-vous ?"
                autocomplete="off">
            <button class="search-button" onclick="handleSearch()">
                <ion-icon name="search-outline"></ion-icon>
            </button>
        </div>

        <!-- Suggestions Dropdown -->
        <div id="suggestions" class="suggestions-dropdown"></div>

        <!-- Default Content -->
        <div id="defaultContent">
            <!-- Recent Searches -->
            <div class="section">
                <div class="section-title">Recherches récentes</div>
                <div id="recentList">
                    <div class="item-row">
                        <ion-icon name="time-outline" class="item-icon"></ion-icon>
                        <span class="item-text">Yaourt Soummam</span>
                        <button class="remove-button">
                            <ion-icon name="close-circle-outline"></ion-icon>
                        </button>
                    </div>
                    <div class="item-row">
                        <ion-icon name="time-outline" class="item-icon"></ion-icon>
                        <span class="item-text">Candi Cho</span>
                        <button class="remove-button">
                            <ion-icon name="close-circle-outline"></ion-icon>
                        </button>
                    </div>
                    <div class="item-row">
                        <ion-icon name="time-outline" class="item-icon"></ion-icon>
                        <span class="item-text">Ighi n tyerza</span>
                        <button class="remove-button">
                            <ion-icon name="close-circle-outline"></ion-icon>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Popular Products -->
            <div class="section">
                <div class="section-title">Les plus recherchés</div>
                <div id="popularList">
                    <div class="popular-item">
                        <div class="popular-text">Lait Gloria</div>
                    </div>
                    <div class="popular-item">
                        <div class="popular-text">Yaourt Fort</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM HANDLING
        const searchInput = document.getElementById('searchInput');
        const suggestions = document.getElementById('suggestions');
        const defaultContent = document.getElementById('defaultContent');

        let currentLang = 'fr';

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;

            if (query.length > 0) {
                currentLang = estimateInputLanguage(query);
                searchInput.placeholder = currentLang === 'fr' ? 'Que cherchez-vous ?' : 'Acu id tettnadiḍ ?';

                const results = getProductSuggestions(query, currentLang, 10);
                renderSuggestions(results, currentLang);
            } else {
                suggestions.style.display = 'none';
                defaultContent.style.display = 'block';
            }
        });

        function renderSuggestions(results, lang) {
            suggestions.innerHTML = '';
            if (results.length === 0) {
                suggestions.innerHTML = '<div class="suggestion-item"><div class="suggestion-text">Aucun produit trouvé</div></div>';
            } else {
                results.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<div class="suggestion-text">${item.translatedName}</div>`;
                    div.onclick = () => {
                        searchInput.value = item.translatedName;
                        suggestions.style.display = 'none';
                    };
                    suggestions.appendChild(div);
                });
            }
            suggestions.style.display = 'block';
            defaultContent.style.display = 'none';
        }

        function handleSearch() {
            const query = searchInput.value;
            if (query) {
                alert('Recherche lancée pour : ' + query);
            }
        }
    </script>

</body>

</html>
